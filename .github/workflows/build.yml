name: Build libWebRTC Weekly

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if no new version'
        type: boolean
        default: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      current_version: ${{ steps.check.outputs.current_version }}
    steps:
      - name: Check for new WebRTC version
        id: check
        run: |
          CHROME_MILESTONE=$(curl -sL "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone.json" | jq -r '.milestones | to_entries | max_by(.key) | .key')
          CURRENT=$(curl -sL "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone.json" | jq -r ".milestones[\"$CHROME_MILESTONE\"].version")
          LAST_BUILT=$(cat .last-built-version 2>/dev/null || echo "0")
          
          if [ "$CURRENT" != "$LAST_BUILT" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
            echo "new_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "current_version=$LAST_BUILT" >> $GITHUB_OUTPUT
            echo "NEW_VERSION=$CURRENT"
          else
            echo "new_version=" >> $GITHUB_OUTPUT
            echo "current_version=$LAST_BUILT" >> $GITHUB_OUTPUT
            echo "No new version found. Current: $CURRENT, Last built: $LAST_BUILT"
          fi

  build-headers:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            patches
      
      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH

      - name: Fetch WebRTC source
        run: |
          mkdir -p webrtc-src
          cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          fetch --nohooks webrtc
          cd src
          for i in 1 2 3 4 5; do
            gclient sync && break
            echo "Sync failed, retry $i/5..."
            sleep 60
          done

      - name: Create headers artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p headers-output
          cp -r webrtc-src/src/api/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/common_audio/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/common_video/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/modules/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/sdk/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/rtc_base/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/rtc_tools/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/third_party/abseil-cpp headers-output/third_party/ 2>/dev/null || true
          zip -r -0 libwebrtc-headers-${VERSION}.zip headers-output

      - name: Upload headers artifact
        uses: actions/upload-artifact@v4
        with:
          name: headers
          path: ${{ github.workspace }}/libwebrtc-headers-*.zip

  build-android:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            patches
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      
      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH

      - name: Fetch WebRTC source
        run: |
          mkdir -p webrtc-src
          cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          fetch --nohooks webrtc
          cd src
          for i in 1 2 3 4 5; do
            gclient sync && break
            echo "Sync failed, retry $i/5..."
            sleep 60
          done

      - name: Apply patches
        run: |
          cd ${{ github.workspace }}/webrtc-src/src
          patch -p1 < ${{ github.workspace }}/patches/android_version.patch || true
          patch -p1 < ${{ github.workspace }}/patches/android_use_libunwind.patch || true
          patch -p1 < ${{ github.workspace }}/patches/disable_use_hermetic_xcode_on_linux.patch || true
          patch -p1 < ${{ github.workspace }}/patches/linux_fix_enable_safe_libstdcxx.patch || true

      - name: Build Android
        run: |
          cd webrtc-src/src
          chmod +x ./build/install-build-deps.sh
          chmod +x ./build/install-build-deps.py
          ./build/install-build-deps.sh --no-chrome --no-nacl --no-android
          export ANDROID_SDK_ROOT="$PWD/third_party/android_sdk"
          mkdir -p out
          gn gen out/Release --args='target_os="android" target_cpu="arm64" is_debug=false is_clang=true is_component_build=false rtc_build_examples=false rtc_build_tools=false rtc_include_tests=false use_rtti=true use_custom_libcxx=false rtc_build_json=true rtc_use_perfetto=false'
          ninja -C out/Release -j8 libwebrtc || true

      - name: Prepare Android artifacts
        run: |
          cd webrtc-src/src
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p output-${VERSION}/lib/arm64-v8a
          cd out/Release/obj
          find . -name '*.o' -not -path '*/sdk/android/*' | head -10
          ../../third_party/llvm-build/Release+Asserts/bin/llvm-ar -rc ../../../output-${VERSION}/lib/arm64-v8a/libwebrtc.a `find . -name '*.o' | grep -v sdk/android`
          ls -la ../../../output-${VERSION}/lib/arm64-v8a/
          cd ../../..
          zip -r -0 libwebrtc-android-${VERSION}.zip output-${VERSION}/lib

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-binary
          path: webrtc-src/src/libwebrtc-android-*.zip

  build-ios:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            patches
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"
      
      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir -p webrtc-src
          cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          fetch --nohooks webrtc
          cd src
          for i in 1 2 3 4 5; do
            gclient sync && break
            echo "Sync failed, retry $i/5..."
            sleep 60
          done

      - name: Apply patches
        run: |
          cd webrtc-src/src
          patch -p1 < ${{ github.workspace }}/patches/disable_use_hermetic_xcode_on_linux.patch || true

      - name: Build iOS framework
        run: |
          cd webrtc-src/src
          mkdir -p out
          mkdir -p build_output
          cd tools_webrtc/ios
          vpython3 build_ios_libs.py --output-dir out --build_config release
          ls -la out/
          cp out/WebRTC.xcframework ../../build_output/ || true

      - name: Create iOS artifact
        run: |
          cd webrtc-src/src/build_output || exit 0
          VERSION=${{ needs.check-version.outputs.new_version }}
          [ -d WebRTC.xcframework ] && zip -r -0 libwebrtc-ios-${VERSION}.zip WebRTC.xcframework || true

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: webrtc-src/src/build_output/libwebrtc-ios-*.zip

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            patches
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"
      
      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir -p webrtc-src
          cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          fetch --nohooks webrtc
          cd src
          for i in 1 2 3 4 5; do
            gclient sync && break
            echo "Sync failed, retry $i/5..."
            sleep 60
          done

      - name: Apply patches
        run: |
          cd webrtc-src/src
          patch -p1 < ${{ github.workspace }}/patches/disable_use_hermetic_xcode_on_linux.patch || true

      - name: Build macOS framework
        run: |
          cd webrtc-src/src/tools_webrtc/ios
          mkdir -p out_macos
          vpython3 build_ios_libs.py --output-dir out_macos --build_config release --arch arm64 x64
          ls -la out_macos/
          cp out_macos/WebRTC.xcframework ../../build_output/WebRTC-mac.xcframework || true

      - name: Create macOS artifact
        run: |
          cd webrtc-src/src/build_output || exit 0
          VERSION=${{ needs.check-version.outputs.new_version }}
          [ -d WebRTC-mac.xcframework ] && zip -r -0 libwebrtc-macos-${VERSION}.zip WebRTC-mac.xcframework || true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: webrtc-src/src/build_output/libwebrtc-macos-*.zip

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            patches
      
      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir -p webrtc-src
          cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          fetch --nohooks webrtc
          cd src
          for i in 1 2 3 4 5; do
            gclient sync && break
            echo "Sync failed, retry $i/5..."
            sleep 60
          done

      - name: Apply patches
        run: |
          cd ${{ github.workspace }}/webrtc-src/src
          patch -p1 < ${{ github.workspace }}/patches/4k_linux.patch || true
          patch -p1 < ${{ github.workspace }}/patches/disable_use_hermetic_xcode_on_linux.patch || true
          patch -p1 < ${{ github.workspace }}/patches/linux_clang_optional.patch || true
          patch -p1 < ${{ github.workspace }}/patches/linux_fix_enable_safe_libstdcxx.patch || true
          patch -p1 < ${{ github.workspace }}/patches/linux_remove_crel.patch || true
          patch -p1 < ${{ github.workspace }}/patches/nacl_armv6_2.patch || true
          patch -p1 < ${{ github.workspace }}/patches/4k.patch || true
          patch -p1 < ${{ github.workspace }}/patches/add_licenses.patch || true
          patch -p1 < ${{ github.workspace }}/patches/add_deps.patch || true

      - name: Install sysroot
        run: |
          cd webrtc-src/src
          chmod +x build/linux/sysroot_scripts/install-sysroot.py
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=amd64
      
      - name: Build Linux
        run: |
          cd webrtc-src/src
          gn gen out/Release --args='target_os="linux" target_cpu="x64" is_debug=false rtc_build_examples=false rtc_build_tools=false rtc_include_tests=false use_rtti=true is_component_build=false' --quiet
          ninja -C out/Release -j8

      - name: Create Linux artifact
        run: |
          cd webrtc-src/src
          echo "Checking build output..."
          ls -la out/Release/obj/ 2>/dev/null | head -20 || echo "obj dir not found"
          
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p output-${VERSION}/lib
          cd out/Release/obj
          /usr/bin/ar -rc ../libwebrtc.a `find . -name '*.o'`
          cp ../libwebrtc.a ../../../output-${VERSION}/lib/libwebrtc.a
          ls -la ../../../output-${VERSION}/lib/
          cd ../../..
          zip -r -0 libwebrtc-linux-${VERSION}.zip output-${VERSION}/lib

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: webrtc-src/src/libwebrtc-linux-*.zip

  build-linux-arm:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            patches
      
      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git depot_tools
          echo "${{ github.workspace }}/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir -p webrtc-src
          cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          fetch --nohooks webrtc
          cd src
          for i in 1 2 3 4 5; do
            gclient sync && break
            echo "Sync failed, retry $i/5..."
            sleep 60
          done

      - name: Apply patches
        run: |
          cd ${{ github.workspace }}/webrtc-src/src
          patch -p1 < ${{ github.workspace }}/patches/4k_linux.patch || true
          patch -p1 < ${{ github.workspace }}/patches/disable_use_hermetic_xcode_on_linux.patch || true
          patch -p1 < ${{ github.workspace }}/patches/linux_clang_optional.patch || true
          patch -p1 < ${{ github.workspace }}/patches/linux_fix_enable_safe_libstdcxx.patch || true
          patch -p1 < ${{ github.workspace }}/patches/linux_remove_crel.patch || true
          patch -p1 < ${{ github.workspace }}/patches/nacl_armv6_2.patch || true
          patch -p1 < ${{ github.workspace }}/patches/4k.patch || true
          patch -p1 < ${{ github.workspace }}/patches/add_licenses.patch || true
          patch -p1 < ${{ github.workspace }}/patches/add_deps.patch || true

      - name: Install ARM sysroot
        run: |
          cd webrtc-src/src
          chmod +x build/linux/sysroot_scripts/install-sysroot.py
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=arm
      
      - name: Build Linux ARM
        run: |
          cd webrtc-src/src
          gn gen out/Release --args='target_os="linux" target_cpu="arm" is_debug=false rtc_build_examples=false rtc_build_tools=false rtc_include_tests=false use_rtti=true is_component_build=false' --quiet
          ninja -C out/Release -j8 || true

      - name: Create Linux ARM artifact
        run: |
          cd webrtc-src/src
          echo "Checking build output..."
          ls -la out/Release/obj/ 2>/dev/null | head -20 || echo "obj dir not found"
          
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p output-${VERSION}/lib
          cd out/Release/obj
          /usr/bin/ar -rc ../libwebrtc.a `find . -name '*.o'`
          cp ../libwebrtc.a ../../../output-${VERSION}/lib/libwebrtc.a
          ls -la ../../../output-${VERSION}/lib/
          cd ../../..
          zip -r -0 libwebrtc-linux-arm-${VERSION}.zip output-${VERSION}/lib

      - name: Upload Linux ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm
          path: webrtc-src/src/libwebrtc-linux-arm-*.zip

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: windows-latest
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            patches
      
      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git depot_tools
          Add-Content -Path $env:GITHUB_PATH -Value "${{ github.workspace }}/depot_tools"
      
      - name: Fetch WebRTC source
        run: |
          mkdir -p webrtc-src
          Set-Location webrtc-src
          $env:DEPOT_TOOLS_HTTP_TIMEOUT = "600"
          $env:GIT_HTTP_TIMEOUT = "300"
          fetch --nohooks webrtc
          Set-Location src
          for ($i = 1; $i -le 5; $i++) {
            gclient sync
            if ($LASTEXITCODE -eq 0) { break }
            Write-Output "Sync failed, retry $i/5..."
            Start-Sleep -Seconds 60
          }

      - name: Apply patches
        run: |
          Set-Location webrtc-src/src
          git apply -p1 --ignore-space-change --ignore-whitespace --whitespace=nowarn --reject "${{ github.workspace }}\patches\4k.patch" || true
          git apply -p1 --ignore-space-change --ignore-whitespace --whitespace=nowarn --reject "${{ github.workspace }}\patches\add_licenses.patch" || true
          git apply -p1 --ignore-space-change --ignore-whitespace --whitespace=nowarn --reject "${{ github.workspace }}\patches\windows_fix_abseil.patch" || true
          git apply -p1 --ignore-space-change --ignore-whitespace --whitespace=nowarn --reject "${{ github.workspace }}\patches\windows_fix_optional.patch" || true
          git apply -p1 --ignore-space-change --ignore-whitespace --whitespace=nowarn --reject "${{ github.workspace }}\patches\windows_add_deps.patch" || true

      - name: Build Windows x64
        run: |
          Set-Location webrtc-src/src
          Write-Output "Starting Windows x64 build..."
          "target_os = `"win`""
          "target_cpu = `"x64`""
          "is_debug = false"
          "treat_warnings_as_errors = false"
          "rtc_use_h264 = false"
          "rtc_include_tests = false"
          "rtc_build_tools = false"
          "rtc_build_examples = false"
          "rtc_use_perfetto = false"
          "is_component_build = false"
          "use_rtti = true"
          "strip_debug_info = true"
          "symbol_level = 0"
          "use_custom_libcxx = false"
          "libyuv_include_tests = false" | Out-File -Encoding ASCII args.txt
          gn gen out/Release --args-file=args.txt
          Write-Output "Running ninja..."
          ninja -C out/Release -j8 2>&1 || Write-Output "Build failed with exit code $LASTEXITCODE"

      - name: Build Windows x86
        run: |
          Set-Location webrtc-src/src
          Write-Output "Starting Windows x86 build..."
          "target_os = `"win`""
          "target_cpu = `"x86`""
          "is_debug = false"
          "treat_warnings_as_errors = false"
          "rtc_use_h264 = false"
          "rtc_include_tests = false"
          "rtc_build_tools = false"
          "rtc_build_examples = false"
          "rtc_use_perfetto = false"
          "is_component_build = false"
          "use_rtti = true"
          "strip_debug_info = true"
          "symbol_level = 0"
          "use_custom_libcxx = false"
          "libyuv_include_tests = false" | Out-File -Encoding ASCII args.txt
          gn gen out/Release-x86 --args-file=args.txt
          Write-Output "Running ninja..."
          ninja -C out/Release-x86 -j8 2>&1 || Write-Output "Build failed with exit code $LASTEXITCODE"

      - name: Create Windows artifact
        run: |
          Set-Location webrtc-src/src
          Write-Output "Checking build output..."
          Get-ChildItem out/Release/obj -ErrorAction SilentlyContinue | Select-Object -First 10
          
          $VERSION = "${{ needs.check-version.outputs.new_version }}"
          New-Item -ItemType Directory -Force -Path lib | Out-Null
          if (Test-Path out/Release/obj/webrtc.lib) {
            Copy-Item out/Release/obj/webrtc.lib lib/webrtc-x64.lib
          }
          if (Test-Path out/Release-x86/obj/webrtc.lib) {
            Copy-Item out/Release-x86/obj/webrtc.lib lib/webrtc-x86.lib
          }
          Get-ChildItem lib/ -ErrorAction SilentlyContinue | Select-Object Name
          if ((Get-ChildItem lib/ -ErrorAction SilentlyContinue).Count -eq 0) {
            Write-Output "lib folder is empty!"
          }
          Compress-Archive -Path lib/* -DestinationPath "libwebrtc-win-${VERSION}.zip" -CompressionLevel NoCompression -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: webrtc-src/src/libwebrtc-win-*.zip

  release:
    needs: [check-version, build-headers, build-android, build-ios, build-macos, build-linux, build-linux-arm, build-windows]
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: libwebrtc-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          find artifacts/ -type f -name "libwebrtc-*" | sort

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: WebRTC ${{ needs.check-version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Source Code
            [View Source](https://webrtc.googlesource.com/src/+refs/tags/v${{ needs.check-version.outputs.new_version }})

            ## Release Notes
            Built from WebRTC version ${{ needs.check-version.outputs.new_version }}
          files: |
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update last built version
        run: |
          echo ${{ needs.check-version.outputs.new_version }} > .last-built-version

      - name: Commit version update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update last built version to ${{ needs.check-version.outputs.new_version }}"
          file_pattern: ".last-built-version"
