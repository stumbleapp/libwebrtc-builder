name: Build libWebRTC Bi-Weekly

on:
  schedule:
    - cron: '0 0 * * 0/2'  # Every 2 weeks on Sunday at midnight UTC
  workflow_dispatch:     # Manual trigger
    inputs:
      force_build:
        description: 'Force rebuild even if no new version'
        type: boolean
        default: false

env:
  WEBRTC_BUILD_TIMEOUT: 120m

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      current_version: ${{ steps.check.outputs.current_version }}
    steps:
      - name: Check for new WebRTC version
        id: check
        run: |
          # Use Chrome for Testing API to get latest milestone version
          CHROME_MILESTONE=$(curl -sL "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone.json" | jq -r '.milestones | to_entries | max_by(.key) | .key')
          CURRENT="m$(curl -sL "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone.json" | jq -r ".milestones[\"$CHROME_MILESTONE\"].version" | cut -d. -f1)"
          LAST_BUILT=$(cat .last-built-version 2>/dev/null || echo "0")
          
          if [ "$CURRENT" != "$LAST_BUILT" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
            echo "new_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "current_version=$LAST_BUILT" >> $GITHUB_OUTPUT
            echo "NEW_VERSION=$CURRENT"
          else
            echo "new_version=" >> $GITHUB_OUTPUT
            echo "current_version=$LAST_BUILT" >> $GITHUB_OUTPUT
            echo "No new version found. Current: $CURRENT, Last built: $LAST_BUILT"
          fi

  # =============================================================================
  # ANDROID BUILD
  # =============================================================================
  build-android:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          fetch --nohooks webrtc_android
          gclient sync -D --force
      
      - name: Build Android AAR
        run: |
          cd webrtc-src/src
          ./build/install-build-deps.sh
          tools_webrtc/android/build_aar.py --output /tmp/webrtc-build
      
      - name: Prepare Android artifacts
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p output-${VERSION}/lib
          cp /tmp/webrtc-build/*.so output-${VERSION}/lib/ 2>/dev/null || true

      - name: Create Android binary artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          tar -cvJf libwebrtc-android-${VERSION}.tar.xz -C output-${VERSION} lib

      - name: Create headers artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p headers-output
          cp -r /tmp/webrtc-build/headers/* headers-output/
          cp -r webrtc-src/src/third_party/abseil-cpp headers-output/third_party/
          tar -cvJf libwebrtc-headers-${VERSION}.tar.xz -C headers-output include

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-binary
          path: libwebrtc-android-*.tar.xz
          compression-level: 0

      - name: Upload headers artifact
        uses: actions/upload-artifact@v4
        with:
          name: headers
          path: libwebrtc-headers-*.tar.xz
          compression-level: 0

  # =============================================================================
  # IOS BUILD
  # =============================================================================
  build-ios:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          fetch --nohooks webrtc_ios
          gclient sync -D --force
      
      - name: Build iOS framework
        run: |
          cd webrtc-src/src
          
          COMMON_ARGS="enable_libaom=true enable_stripping=true ios_enable_code_signing=false is_component_build=false is_debug=false rtc_build_examples=false rtc_enable_protobuf=false rtc_enable_symbol_export=true rtc_include_tests=false rtc_libvpx_build_vp9=true treat_warnings_as_errors=true use_rtti=true enable_dsyms=false use_custom_libcxx=false"
          
          gn gen out/ios-device --args="$COMMON_ARGS target_os=\"ios\" target_environment=\"device\" target_cpu=\"arm64\" ios_deployment_target=\"13.0\""
          ninja -C out/ios-device ios_framework_bundle -j6 --quiet
          
          gn gen out/ios-simulator --args="$COMMON_ARGS target_os=\"ios\" target_environment=\"simulator\" target_cpu=\"arm64\" ios_deployment_target=\"13.0\""
          ninja -C out/ios-simulator ios_framework_bundle -j6 --quiet
          
          cp -R out/ios-device/WebRTC.framework ios-device.framework
          cp -R out/ios-simulator/WebRTC.framework ios-simulator.framework
          
          xcodebuild -create-xcframework -framework ios-device.framework/WebRTC.framework -framework ios-simulator.framework/WebRTC.framework -output WebRTC.xcframework

      - name: Create iOS artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          zip -r libwebrtc-ios-${VERSION}.zip WebRTC.xcframework

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: libwebrtc-ios-*.zip
          compression-level: 0

  # =============================================================================
  # TVOS BUILD
  # =============================================================================
  build-tvos:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          fetch --nohooks webrtc_ios
          gclient sync -D --force
      
      - name: Build tvOS framework
        run: |
          cd webrtc-src/src
          
          COMMON_ARGS="enable_libaom=true enable_stripping=true ios_enable_code_signing=false is_component_build=false is_debug=false rtc_build_examples=false rtc_enable_protobuf=false rtc_enable_symbol_export=true rtc_include_tests=false rtc_libvpx_build_vp9=true treat_warnings_as_errors=true use_rtti=true enable_dsyms=false use_custom_libcxx=false"
          
          gn gen out/tvos-device --args="$COMMON_ARGS target_os=\"tvos\" target_environment=\"device\" target_cpu=\"arm64\" ios_deployment_target=\"17.0\""
          ninja -C out/tvos-device ios_framework_bundle -j6 --quiet
          
          gn gen out/tvos-simulator --args="$COMMON_ARGS target_os=\"tvos\" target_environment=\"simulator\" target_cpu=\"arm64\" ios_deployment_target=\"17.0\""
          ninja -C out/tvos-simulator ios_framework_bundle -j6 --quiet
          
          xcodebuild -create-xcframework -framework out/tvos-device/WebRTC.framework -framework out/tvos-simulator/WebRTC.framework -output WebRTC.xcframework

      - name: Create tvOS artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          zip -r libwebrtc-tvos-${VERSION}.zip WebRTC.xcframework

      - name: Upload tvOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvos
          path: libwebrtc-tvos-*.zip
          compression-level: 0

  # =============================================================================
  # MACOS BUILD
  # =============================================================================
  build-macos:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          fetch --nohooks webrtc
          gclient sync -D --force
      
      - name: Build macOS framework
        run: |
          cd webrtc-src/src
          
          COMMON_ARGS="enable_libaom=true enable_stripping=true is_component_build=false is_debug=false rtc_build_examples=false rtc_enable_protobuf=false rtc_enable_symbol_export=true rtc_include_tests=false rtc_libvpx_build_vp9=true treat_warnings_as_errors=true use_rtti=true enable_dsyms=false use_custom_libcxx=false"
          
          gn gen out/macos-arm64 --args="$COMMON_ARGS target_os=\"mac\" target_cpu=\"arm64\" mac_deployment_target=\"10.15\""
          ninja -C out/macos-arm64 mac_framework_bundle -j6 --quiet
          
          gn gen out/macos-x64 --args="$COMMON_ARGS target_os=\"mac\" target_cpu=\"x64\" mac_deployment_target=\"10.15\""
          ninja -C out/macos-x64 mac_framework_bundle -j6 --quiet
          
          lipo -create -output WebRTC.framework/WebRTC out/macos-arm64/WebRTC.framework/WebRTC out/macos-x64/WebRTC.framework/WebRTC
          cp -R out/macos-arm64/WebRTC.framework .

      - name: Create macOS artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          tar -cvJf libwebrtc-macos-${VERSION}.tar.xz WebRTC.framework

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: libwebrtc-macos-*.tar.xz
          compression-level: 0

  # =============================================================================
  # MACOS CATALYST BUILD
  # =============================================================================
  build-macos-catalyst:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          fetch --nohooks webrtc
          gclient sync -D --force
      
      - name: Build macOS Catalyst framework
        run: |
          cd webrtc-src/src
          
          COMMON_ARGS="enable_libaom=true enable_stripping=true is_component_build=false is_debug=false rtc_build_examples=false rtc_enable_protobuf=false rtc_enable_symbol_export=true rtc_include_tests=false rtc_libvpx_build_vp9=true treat_warnings_as_errors=true use_rtti=true enable_dsyms=false use_custom_libcxx=false"
          
          gn gen out/catalyst-arm64 --args="$COMMON_ARGS target_os=\"ios\" target_environment=\"catalyst\" target_cpu=\"arm64\" ios_deployment_target=\"14.0\""
          ninja -C out/catalyst-arm64 ios_framework_bundle -j6 --quiet
          
          gn gen out/catalyst-x64 --args="$COMMON_ARGS target_os=\"ios\" target_environment=\"catalyst\" target_cpu=\"x64\" ios_deployment_target=\"14.0\""
          ninja -C out/catalyst-x64 ios_framework_bundle -j6 --quiet
          
          lipo -create -output WebRTC.framework/WebRTC out/catalyst-arm64/WebRTC.framework/WebRTC out/catalyst-x64/WebRTC.framework/WebRTC
          cp -R out/catalyst-arm64/WebRTC.framework .

      - name: Create macOS Catalyst artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          tar -cvJf libwebrtc-macos-catalyst-${VERSION}.tar.xz WebRTC.framework

      - name: Upload macOS Catalyst artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-catalyst
          path: libwebrtc-macos-catalyst-*.tar.xz
          compression-level: 0

  # =============================================================================
  # LINUX BUILD
  # =============================================================================
  build-linux:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          fetch --nohooks webrtc
          gclient sync -D --force
      
      - name: Install sysroot
        run: |
          cd webrtc-src/src
          build/linux/sysroot_scripts/install-sysroot.py --arch=amd64
      
      - name: Build Linux
        run: |
          cd webrtc-src/src
          gn gen out/Release --args='target_os="linux" target_cpu="x64" is_debug=false' --quiet
          ninja -C out/Release webrtc

      - name: Create Linux artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p lib
          cp webrtc-src/src/out/Release/lib*.so lib/ 2>/dev/null || true
          tar -cvJf libwebrtc-linux-${VERSION}.tar.xz lib

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: libwebrtc-linux-*.tar.xz
          compression-level: 0

  # =============================================================================
  # LINUX ARM BUILD
  # =============================================================================
  build-linux-arm:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          fetch --nohooks webrtc
          gclient sync -D --force
      
      - name: Install ARM sysroot
        run: |
          cd webrtc-src/src
          build/linux/sysroot_scripts/install-sysroot.py --arch=arm
      
      - name: Build Linux ARM
        run: |
          cd webrtc-src/src
          gn gen out/Release --args='target_os="linux" target_cpu="arm" is_debug=false' --quiet
          ninja -C out/Release webrtc

      - name: Create Linux ARM artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p lib
          cp webrtc-src/src/out/Release/lib*.so lib/ 2>/dev/null || true
          tar -cvJf libwebrtc-linux-arm-${VERSION}.tar.xz lib

      - name: Upload Linux ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm
          path: libwebrtc-linux-arm-*.tar.xz
          compression-level: 0

  # =============================================================================
  # WINDOWS BUILD
  # =============================================================================
  build-windows:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: windows-latest
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git $env:TEMP\depot_tools
          echo "$env:TEMP\depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src
          Set-Location webrtc-src
          $env:DEPOT_TOOLS = "$env:TEMP\depot_tools"
          fetch --nohooks webrtc
          gclient sync -D --force
      
      - name: Build Windows x64
        run: |
          Set-Location webrtc-src\src
          gn gen out\Release --args="target_os=`"win`" target_cpu=`"x64`" is_debug=false"
          ninja -C out\Release webrtc

      - name: Build Windows x86
        run: |
          Set-Location webrtc-src\src
          gn gen out\Release-x86 --args="target_os=`"win`" target_cpu=`"x86`" is_debug=false"
          ninja -C out\Release-x86 webrtc

      - name: Create Windows artifact
        run: |
          VERSION="${{ needs.check-version.outputs.new_version }}"
          mkdir lib
          Copy-Item webrtc-src\src\out\Release\*.dll lib\ 2>$null
          Copy-Item webrtc-src\src\out\Release-x86\*.dll lib\ 2>$null
          Compress-Archive -Path lib\* -DestinationPath "libwebrtc-win-${VERSION}.7z" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: libwebrtc-win-*.7z
          compression-level: 0

  # =============================================================================
  # RELEASE
  # =============================================================================
  release:
    needs: [check-version, build-android, build-ios, build-tvos, build-macos, build-macos-catalyst, build-linux, build-linux-arm, build-windows]
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: libwebrtc-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          find artifacts/ -type f -name "libwebrtc-*" | sort

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: WebRTC ${{ needs.check-version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.xz
            artifacts/**/*.zip
            artifacts/**/*.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update last built version
        run: |
          echo ${{ needs.check-version.outputs.new_version }} > .last-built-version

      - name: Commit version update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update last built version to ${{ needs.check-version.outputs.new_version }}"
          file_pattern: ".last-built-version"
