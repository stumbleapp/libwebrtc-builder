          # Configure gclient for Linux
          echo 'target_os = ["linux"]' > ../.gclient
          echo 'solutions = [{"name": "src", "url": "https://webrtc.googlesource.com/src.git", "deps_file": "DEPS", "managed": False}]' >> ../.gclient
          
          gclient sync --force
          gclient runhooks
          
          # Install sysroots for all architectures
          python3 build/linux/sysroot_scripts/install-sysroot.py --all

      - name: Build Linux arm64
        run: |
          cd webrtc-src/src
          gn gen out/Release-arm64 --args='target_os="linux" target_cpu="arm64" is_debug=false rtc_build_examples=false rtc_build_tools=false rtc_include_tests=false use_rtti=true is_component_build=false' --quiet
          ninja -C out/Release-arm64 -j16 webrtc

