  build-windows:
    needs: [check-version, prepare-depot-tools, fetch-webrtc]
    if: false
    runs-on: windows-latest
    timeout-minutes: 240
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
    steps:
      - name: Restore WebRTC source
        uses: actions/cache@v5.0.4
        with:
          path: |
            webrtc-src.tar.zst
            webrtc-src.tar.xz
            webrtc-src.tar.gz
          key: webrtc-source-${{ needs.check-version.outputs.new_version }}
          restore-keys: webrtc-source-
          enableCrossOsArchive: true

      - name: Decompress WebRTC source
        run: |
          Write-Output "Current directory: $(Get-Location)"
          Write-Output "Files in root: $(Get-ChildItem -Name)"
          if (Test-Path webrtc-src.tar.zst) {
            Write-Output "Found webrtc-src.tar.zst, decompressing..."
            Remove-Item -Recurse -Force "$env:TEMP\webrtc-src" -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path "$env:TEMP\webrtc-src" -Force
            Set-Location "$env:TEMP\webrtc-src"
            zstd -d "${{ github.workspace }}\webrtc-src.tar.zst" -o webrtc-src.tar
            Write-Output "Extracting webrtc-src.tar..."
            tar -xf webrtc-src.tar
            Remove-Item webrtc-src.tar -Force -ErrorAction SilentlyContinue
            Set-Location "${{ github.workspace }}"
          } elseif (Test-Path webrtc-src.tar.xz) {
            Remove-Item -Recurse -Force "$env:TEMP\webrtc-src" -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path "$env:TEMP\webrtc-src" -Force
            Set-Location "$env:TEMP\webrtc-src"
            tar -Jxf "${{ github.workspace }}/webrtc-src.tar.xz"
            Set-Location "${{ github.workspace }}"
          } elseif (Test-Path webrtc-src.tar.gz) {
            Remove-Item -Recurse -Force "$env:TEMP\webrtc-src" -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path "$env:TEMP\webrtc-src" -Force
            Set-Location "$env:TEMP\webrtc-src"
            tar -xzf "${{ github.workspace }}/webrtc-src.tar.gz"
            Set-Location "${{ github.workspace }}"
          }
          Write-Output "Extracted contents:"
          Get-ChildItem "$env:TEMP\webrtc-src"

      - name: Checkout patches
        run: |
          Remove-Item -Recurse -Force "$env:TEMP\patches-temp" -ErrorAction SilentlyContinue
          git clone --depth=1 --sparse --branch main https://github.com/${{ github.repository }} "$env:TEMP\patches-temp"
          Set-Location "$env:TEMP\patches-temp"
          git sparse-checkout set patches
          Remove-Item -Recurse -Force "${{ github.workspace }}\patches" -ErrorAction SilentlyContinue
          Move-Item -Force "$env:TEMP\patches-temp\patches" "${{ github.workspace }}\patches"
          Write-Output "After checkout:"
          Get-ChildItem "${{ github.workspace }}\patches"

      - name: Move webrtc source to workspace
        run: |
          Remove-Item -Recurse -Force "${{ github.workspace }}\webrtc-src" -ErrorAction SilentlyContinue
          Move-Item -Force "$env:TEMP\webrtc-src\webrtc-src" "${{ github.workspace }}\webrtc-src"
          Write-Output "webrtc-src moved to workspace:"
          Get-ChildItem "${{ github.workspace }}\webrtc-src"

      - name: Apply patches
        run: |
          function Apply-Patch {
            param([string]$Patch)
            $result = git apply -p1 --ignore-space-change --ignore-whitespace --whitespace=nowarn --reject "$Patch" 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Output "✓ Applied: $(Split-Path $Patch -Leaf)"
            } else {
              Write-Output "⚠ Warning: $(Split-Path $Patch -Leaf) failed or already applied" 2>&1
            }
          }
          Set-Location "${{ github.workspace }}/webrtc-src/src"
          Apply-Patch "${{ github.workspace }}/patches/4k.patch"
          Apply-Patch "${{ github.workspace }}/patches/add_licenses.patch"
          Apply-Patch "${{ github.workspace }}/patches/windows_fix_abseil.patch"
          Apply-Patch "${{ github.workspace }}/patches/windows_fix_optional.patch"
          Apply-Patch "${{ github.workspace }}/patches/windows_add_deps.patch"

      - name: Restore depot_tools
        id: cache-depot-tools
        uses: actions/cache@v5.0.4
        with:
          path: depot_tools
          key: depot-tools-${{ needs.check-version.outputs.new_version }}
          restore-keys: depot-tools-
          enableCrossOsArchive: true

      - name: Initialize depot_tools
        run: |
          $env:PATH = "${{ github.workspace }}\depot_tools;" + $env:PATH
          Add-Content -Path $env:GITHUB_PATH -Value "${{ github.workspace }}\depot_tools"
          Set-Location "${{ github.workspace }}/webrtc-src/src"
          
          # Configure gclient for Windows
          "target_os = [`win`]" | Out-File -FilePath ../.gclient -Encoding ASCII
          "solutions = [{`name`: `src`, `url`: `https://webrtc.googlesource.com/src.git`, `deps_file`: `DEPS`, `managed`: False}]" | Out-File -FilePath ../.gclient -Append -Encoding ASCII
          
          gclient sync --force
          gclient runhooks

      - name: Build Windows x64
        run: |
          Set-Location "${{ github.workspace }}/webrtc-src/src"
          Write-Output "Starting Windows x64 build..."
          "target_os = `"win`""
          "target_cpu = `"x64`""
          "is_debug = false"
          "treat_warnings_as_errors = false"
          "rtc_use_h264 = false"
          "rtc_include_tests = false"
          "rtc_build_tools = false"
          "rtc_build_examples = false"
          "rtc_use_perfetto = false"
          "is_component_build = false"
          "use_rtti = true"
          "strip_debug_info = true"
          "symbol_level = 0"
          "use_custom_libcxx = false"
          "libyuv_include_tests = false" | Out-File -Encoding ASCII args.txt
          gn gen out/Release --args-file=args.txt
          Write-Output "Running ninja..."
          ninja -C out/Release -j16
          if ($LASTEXITCODE -ne 0) { throw "Build failed with exit code $LASTEXITCODE" }

      - name: Build Windows x86
        run: |
          Set-Location "${{ github.workspace }}/webrtc-src/src"
          Write-Output "Starting Windows x86 build..."
          "target_os = `"win`""
          "target_cpu = `"x86`""
          "is_debug = false"
          "treat_warnings_as_errors = false"
          "rtc_use_h264 = false"
          "rtc_include_tests = false"
          "rtc_build_tools = false"
          "rtc_build_examples = false"
          "rtc_use_perfetto = false"
          "is_component_build = false"
          "use_rtti = true"
          "strip_debug_info = true"
          "symbol_level = 0"
          "use_custom_libcxx = false"
          "libyuv_include_tests = false" | Out-File -Encoding ASCII args.txt
          gn gen out/Release-x86 --args-file=args.txt
          Write-Output "Running ninja..."
          ninja -C out/Release-x86 -j16
          if ($LASTEXITCODE -ne 0) { throw "Build failed with exit code $LASTEXITCODE" }

      - name: Create Windows x64 artifact
        run: |
          Set-Location webrtc-src/src
          Write-Output "Checking build output..."
          Get-ChildItem out/Release/obj -ErrorAction SilentlyContinue | Select-Object -First 10
          
          $VERSION = "${{ needs.check-version.outputs.new_version }}"
          New-Item -ItemType Directory -Force -Path lib-x64 | Out-Null
          if (Test-Path out/Release/obj/webrtc.lib) {
            Copy-Item out/Release/obj/webrtc.lib lib-x64/webrtc-x64.lib
          }
          Get-ChildItem lib-x64/ -ErrorAction SilentlyContinue | Select-Object Name
          if ((Get-ChildItem lib-x64/ -ErrorAction SilentlyContinue).Count -eq 0) {
            throw "lib folder is empty!"
          }
          Compress-Archive -Path lib-x64/* -DestinationPath "libwebrtc-win-x64-${VERSION}.zip" -CompressionLevel NoCompression -Force

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-x64
          path: webrtc-src/src/libwebrtc-win-x64-*.zip

      - name: Create Windows x86 artifact
        run: |
          Set-Location webrtc-src/src
          Write-Output "Checking build output..."
          Get-ChildItem out/Release-x86/obj -ErrorAction SilentlyContinue | Select-Object -First 10
          
          $VERSION = "${{ needs.check-version.outputs.new_version }}"
          New-Item -ItemType Directory -Force -Path lib-x86 | Out-Null
          if (Test-Path out/Release-x86/obj/webrtc.lib) {
            Copy-Item out/Release-x86/obj/webrtc.lib lib-x86/webrtc-x86.lib
          }
          Get-ChildItem lib-x86/ -ErrorAction SilentlyContinue | Select-Object Name
          if ((Get-ChildItem lib-x86/ -ErrorAction SilentlyContinue).Count -eq 0) {
            throw "lib folder is empty!"
          }
          Compress-Archive -Path lib-x86/* -DestinationPath "libwebrtc-win-x86-${VERSION}.zip" -CompressionLevel NoCompression -Force

      - name: Upload Windows x86 artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-x86
          path: webrtc-src/src/libwebrtc-win-x86-*.zip

  release:
    needs: [check-version, fetch-webrtc, package-headers, build-android, build-ios, build-macos, build-linux, build-windows]
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
          pattern: libwebrtc-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          find artifacts/ -type f -name "libwebrtc-*" | sort

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: WebRTC ${{ needs.check-version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Source Code
            [View Source](https://webrtc.googlesource.com/src/+refs/tags/v${{ needs.check-version.outputs.new_version }})

            ## Release Notes
            Built from WebRTC version ${{ needs.check-version.outputs.new_version }}
          files: |
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update last built version
        run: |
          echo ${{ needs.check-version.outputs.new_version }} > .last-built-version

      - name: Checkout
        uses: actions/checkout@v5.0.1
        with:
          fetch-depth: 0

      - name: Commit version update
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "Update last built version to ${{ needs.check-version.outputs.new_version }}"
          file_pattern: ".last-built-version"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
