name: Build libWebRTC Bi-Weekly

on:
  schedule:
    - cron: '0 0 * * 0/2'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if no new version'
        type: boolean
        default: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      current_version: ${{ steps.check.outputs.current_version }}
    steps:
      - name: Check for new WebRTC version
        id: check
        run: |
          CHROME_MILESTONE=$(curl -sL "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone.json" | jq -r '.milestones | to_entries | max_by(.key) | .key')
          CURRENT=$(curl -sL "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone.json" | jq -r ".milestones[\"$CHROME_MILESTONE\"].version")
          LAST_BUILT=$(cat .last-built-version 2>/dev/null || echo "0")
          
          if [ "$CURRENT" != "$LAST_BUILT" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
            echo "new_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "current_version=$LAST_BUILT" >> $GITHUB_OUTPUT
            echo "NEW_VERSION=$CURRENT"
          else
            echo "new_version=" >> $GITHUB_OUTPUT
            echo "current_version=$LAST_BUILT" >> $GITHUB_OUTPUT
            echo "No new version found. Current: $CURRENT, Last built: $LAST_BUILT"
          fi

  fetch-source:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Check WebRTC source cache
        id: source-cache
        uses: actions/cache/restore@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}
          restore-keys: webrtc-

      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/depot_tools
          key: depot-tools-${{ needs.check-version.outputs.new_version }}
      
      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
      
      - name: Add depot_tools to PATH
        run: |
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p webrtc-src
          cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          for i in 1 2 3; do
            fetch --nohooks --nohistory webrtc && break
            echo "Fetch failed, retry $i/3..."
            rm -rf webrtc-src
            sleep 30
          done
          cd src
          for i in 1 2 3; do
            gclient sync -D --force && break
            echo "Sync failed, retry $i/3..."
            sleep 30
          done
      
      - name: Ensure source exists
        run: |
          if [ ! -d "webrtc-src/src" ]; then
            echo "Source not found in cache!"
            exit 1
          fi
          echo "Source ready"

      - name: Save WebRTC source cache
        if: steps.source-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}

      - name: Save depot_tools cache
        if: steps.depot-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/depot_tools
          key: depot-tools-${{ needs.check-version.outputs.new_version }}

  build-android:
    needs: [check-version, fetch-source]
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Check WebRTC source cache
        id: source-cache
        uses: actions/cache/restore@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}
          restore-keys: webrtc-

      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/depot_tools
          key: depot-tools-${{ needs.check-version.outputs.new_version }}

      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools

      - name: Add depot_tools to PATH
        run: |
          echo "/tmp/depot_tools" >> $GITHUB_PATH

      - name: Initialize depot_tools
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          cd webrtc-src
          git config --global core.autocrlf false
          git config --global core.filemode false
          gclient config https://webrtc.googlesource.com/src.git
          gclient sync -D

      - name: Build Android
        run: |
          cd webrtc-src/src
          chmod +x ./build/install-build-deps.sh
          chmod +x ./build/install-build-deps.py
          ./build/install-build-deps.sh --no-chrome --no-nacl --no-android
          cd ..
          gclient sync -D
          cd src
          gn gen out/Release --args='target_os="android" target_cpu="arm64" is_debug=false'
          ninja -C out/Release webrtc -j8

      - name: Prepare Android artifacts
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p output-${VERSION}/lib
          cp webrtc-src/src/out/Release/lib*.so output-${VERSION}/lib/ 2>/dev/null || true

      - name: Create Android binary artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          zip -r libwebrtc-android-${VERSION}.zip -r output-${VERSION}/lib

      - name: Create headers artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p headers-output
          cp -r webrtc-src/src/api/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/common_audio/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/common_video/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/modules/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/sdk/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/rtc_base/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/rtc_tools/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/third_party/abseil-cpp headers-output/third_party/ 2>/dev/null || true
          zip -r libwebrtc-headers-${VERSION}.zip headers-output

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-binary
          path: libwebrtc-android-*.zip
          compression-level: 0

      - name: Upload headers artifact
        uses: actions/upload-artifact@v4
        with:
          name: headers
          path: libwebrtc-headers-*.zip
          compression-level: 0

  build-apple:
    needs: [check-version, fetch-source]
    if: needs.check-version.outputs.new_version != ''
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Check WebRTC source cache
        id: source-cache
        uses: actions/cache/restore@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}
          restore-keys: webrtc-

      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/depot_tools
          key: depot-tools-${{ needs.check-version.outputs.new_version }}

      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools

      - name: Add depot_tools to PATH
        run: |
          echo "/tmp/depot_tools" >> $GITHUB_PATH

      - name: Initialize depot_tools
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          cd webrtc-src
          git config --global core.autocrlf false
          git config --global core.filemode false
          gclient config https://webrtc.googlesource.com/src.git
          gclient sync -D

      - name: Build iOS framework
        run: |
          cd webrtc-src/src
          gn gen out/ios-device --args="target_os=\"ios\" target_environment=\"device\" target_cpu=\"arm64\" ios_deployment_target=\"13.0\" ios_enable_code_signing=false rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false use_lld=false"
          ninja -C out/ios-device ios_framework_bundle -j8 || true
          gn gen out/ios-simulator --args="target_os=\"ios\" target_environment=\"simulator\" target_cpu=\"arm64\" ios_deployment_target=\"13.0\" ios_enable_code_signing=false rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false use_lld=false"
          ninja -C out/ios-simulator ios_framework_bundle -j8 || true

      - name: Build tvOS framework
        run: |
          cd webrtc-src/src
          gn gen out/tvos-device --args="target_os=\"ios\" target_environment=\"device\" target_cpu=\"arm64\" ios_deployment_target=\"17.0\" ios_enable_code_signing=false rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false use_lld=false"
          ninja -C out/tvos-device ios_framework_bundle -j8 || true
          gn gen out/tvos-simulator --args="target_os=\"ios\" target_environment=\"device\" target_cpu=\"arm64\" ios_deployment_target=\"17.0\" ios_enable_code_signing=false rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false use_lld=false"
          ninja -C out/tvos-simulator ios_framework_bundle -j8 || true

      - name: Build macOS framework
        run: |
          cd webrtc-src/src
          gn gen out/macos-arm64 --args="target_os=\"mac\" target_cpu=\"arm64\" mac_deployment_target=\"10.15\" rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false use_lld=false"
          ninja -C out/macos-arm64 mac_framework_bundle -j8 || true
          gn gen out/macos-x64 --args="target_os=\"mac\" target_cpu=\"x64\" mac_deployment_target=\"10.15\" rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false use_lld=false"
          ninja -C out/macos-x64 mac_framework_bundle -j8 || true

      - name: Build macOS Catalyst framework
        run: |
          cd webrtc-src/src
          gn gen out/catalyst-arm64 --args="target_os=\"ios\" target_environment=\"catalyst\" target_cpu=\"arm64\" ios_deployment_target=\"14.0\" ios_enable_code_signing=false rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false use_lld=false"
          ninja -C out/catalyst-arm64 ios_framework_bundle -j8 || true
          gn gen out/catalyst-x64 --args="target_os=\"ios\" target_environment=\"catalyst\" target_cpu=\"x64\" ios_deployment_target=\"14.0\" ios_enable_code_signing=false rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false use_lld=false"
          ninja -C out/catalyst-x64 ios_framework_bundle -j8 || true

      - name: Create Apple artifacts
        run: |
          cd webrtc-src/src
          
          if [ -d out/ios-device/WebRTC.framework ]; then
            cp -R out/ios-device/WebRTC.framework ios-device.framework
            cp -R out/ios-simulator/WebRTC.framework ios-simulator.framework
            xcodebuild -create-xcframework -framework ios-device.framework/WebRTC.framework -framework ios-simulator.framework/WebRTC.framework -output WebRTC.xcframework
          fi
          
          if [ -d out/tvos-device/WebRTC.framework ]; then
            xcodebuild -create-xcframework -framework out/tvos-device/WebRTC.framework -framework out/tvos-simulator/WebRTC.framework -output WebRTC-tvOS.xcframework
          fi
          
          if [ -d out/macos-arm64/WebRTC.framework ]; then
            lipo -create -output WebRTC-mac.framework/WebRTC out/macos-arm64/WebRTC.framework/WebRTC out/macos-x64/WebRTC.framework/WebRTC
            cp -R out/macos-arm64/WebRTC.framework WebRTC-mac.framework
          fi
          
          if [ -d out/catalyst-arm64/WebRTC.framework ]; then
            lipo -create -output WebRTC-catalyst.framework/WebRTC out/catalyst-arm64/WebRTC.framework/WebRTC out/catalyst-x64/WebRTC.framework/WebRTC
            cp -R out/catalyst-arm64/WebRTC.framework WebRTC-catalyst.framework
          fi
          
          VERSION=${{ needs.check-version.outputs.new_version }}
          [ -d WebRTC.xcframework ] && zip -r libwebrtc-ios-${VERSION}.zip WebRTC.xcframework
          [ -d WebRTC-tvOS.xcframework ] && zip -r libwebrtc-tvos-${VERSION}.zip WebRTC-tvOS.xcframework
          [ -d WebRTC-mac.framework ] && zip -r libwebrtc-macos-${VERSION}.zip WebRTC-mac.framework
          [ -d WebRTC-catalyst.framework ] && zip -r libwebrtc-macos-catalyst-${VERSION}.zip WebRTC-catalyst.framework

      - name: Upload Apple artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple
          path: |
            libwebrtc-ios-*.zip
            libwebrtc-tvos-*.zip
            libwebrtc-macos-*.zip
            libwebrtc-macos-catalyst-*.zip
          compression-level: 0

  build-linux:
    needs: [check-version, fetch-source]
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Check WebRTC source cache
        id: source-cache
        uses: actions/cache/restore@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}
          restore-keys: webrtc-

      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/depot_tools
          key: depot-tools-${{ needs.check-version.outputs.new_version }}

      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
      
      - name: Add depot_tools to PATH
        run: |
          echo "/tmp/depot_tools" >> $GITHUB_PATH

      - name: Initialize depot_tools
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          cd webrtc-src
          git config --global core.autocrlf false
          git config --global core.filemode false
          gclient config https://webrtc.googlesource.com/src.git
          gclient sync -D

      - name: Install sysroot
        run: |
          cd webrtc-src/src
          chmod +x build/linux/sysroot_scripts/install-sysroot.py
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=amd64
      
      - name: Build Linux
        run: |
          cd webrtc-src/src
          gn gen out/Release --args='target_os="linux" target_cpu="x64" is_debug=false' --quiet
          ninja -C out/Release webrtc -j8

      - name: Create Linux artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p lib
          cp webrtc-src/src/out/Release/lib*.so lib/ 2>/dev/null || true
          zip -r libwebrtc-linux-${VERSION}.zip lib

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: libwebrtc-linux-*.zip
          compression-level: 0

  build-linux-arm:
    needs: [check-version, fetch-source]
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Check WebRTC source cache
        id: source-cache
        uses: actions/cache/restore@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}
          restore-keys: webrtc-

      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/depot_tools
          key: depot-tools-${{ needs.check-version.outputs.new_version }}

      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools

      - name: Add depot_tools to PATH
        run: |
          echo "/tmp/depot_tools" >> $GITHUB_PATH

      - name: Initialize depot_tools
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          cd webrtc-src
          git config --global core.autocrlf false
          git config --global core.filemode false
          gclient config https://webrtc.googlesource.com/src.git
          gclient sync -D

      - name: Install ARM sysroot
        run: |
          cd webrtc-src/src
          chmod +x build/linux/sysroot_scripts/install-sysroot.py
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=arm
      
      - name: Build Linux ARM
        run: |
          cd webrtc-src/src
          gn gen out/Release --args='target_os="linux" target_cpu="arm" is_debug=false' --quiet
          ninja -C out/Release webrtc -j8

      - name: Create Linux ARM artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p lib
          cp webrtc-src/src/out/Release/lib*.so lib/ 2>/dev/null || true
          zip -r libwebrtc-linux-arm-${VERSION}.zip lib

      - name: Upload Linux ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm
          path: libwebrtc-linux-arm-*.zip
          compression-level: 0

  build-windows:
    needs: [check-version, fetch-source]
    if: needs.check-version.outputs.new_version != ''
    runs-on: windows-latest
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Check WebRTC source cache
        id: source-cache
        uses: actions/cache/restore@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}
          restore-keys: webrtc-

      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.TEMP }}/depot_tools
          key: depot-tools-${{ needs.check-version.outputs.new_version }}

      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$env:TEMP/depot_tools"

      - name: Add depot_tools to PATH
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "$env:TEMP/depot_tools"
      
      - name: Initialize depot_tools
        if: steps.source-cache.outputs.cache-hit != 'true'
        run: |
          Set-Location webrtc-src
          git config --global core.autocrlf false
          git config --global core.filemode false
          gclient config https://webrtc.googlesource.com/src.git
          gclient sync -D

      - name: Ensure source exists
        run: |
          if (!(Test-Path webrtc-src/src)) {
            Write-Error "Source not found in cache!"
            exit 1
          }
          Write-Output "Source ready"

      - name: Build Windows x64
        run: |
          Set-Location webrtc-src/src
          gn gen out/Release --args='target_os="win" target_cpu="x64" is_debug=false'
          ninja -C out/Release webrtc -j8

      - name: Build Windows x86
        run: |
          Set-Location webrtc-src/src
          gn gen out/Release-x86 --args='target_os="win" target_cpu="x86" is_debug=false'
          ninja -C out/Release-x86 webrtc -j8

      - name: Create Windows artifact
        run: |
          Set-Location webrtc-src/src
          $VERSION = "${{ needs.check-version.outputs.new_version }}"
          New-Item -ItemType Directory -Force -Path lib | Out-Null
          Copy-Item out/Release/*.dll lib/ -ErrorAction SilentlyContinue
          Copy-Item out/Release-x86/*.dll lib/ -ErrorAction SilentlyContinue
          Compress-Archive -Path lib/* -DestinationPath "libwebrtc-win-${VERSION}.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: libwebrtc-win-*.zip
          compression-level: 0

  release:
    needs: [check-version, build-android, build-apple, build-linux, build-linux-arm, build-windows]
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: libwebrtc-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          find artifacts/ -type f -name "libwebrtc-*" | sort

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: WebRTC ${{ needs.check-version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Source Code
            [View Source](https://webrtc.googlesource.com/src/+refs/tags/v${{ needs.check-version.outputs.new_version }})

            ## Release Notes
            Built from WebRTC version ${{ needs.check-version.outputs.new_version }}
          files: |
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update last built version
        run: |
          echo ${{ needs.check-version.outputs.new_version }} > .last-built-version

      - name: Commit version update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update last built version to ${{ needs.check-version.outputs.new_version }}"
          file_pattern: ".last-built-version"
