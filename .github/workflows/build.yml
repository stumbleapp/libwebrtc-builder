            fi
          }
          cd ${{ github.workspace }}/webrtc-src/src
          apply_patch ${{ github.workspace }}/patches/4k_linux.patch
          apply_patch ${{ github.workspace }}/patches/disable_use_hermetic_xcode_on_linux.patch
          apply_patch ${{ github.workspace }}/patches/linux_clang_optional.patch
          apply_patch ${{ github.workspace }}/patches/linux_fix_enable_safe_libstdcxx.patch
          apply_patch ${{ github.workspace }}/patches/linux_remove_crel.patch
          apply_patch ${{ github.workspace }}/patches/nacl_armv6_2.patch
          apply_patch ${{ github.workspace }}/patches/4k.patch
          apply_patch ${{ github.workspace }}/patches/add_licenses.patch
          apply_patch ${{ github.workspace }}/patches/add_deps.patch

      - name: Restore depot_tools
        id: cache-depot-tools
        uses: actions/cache@v5.0.4
        with:
          path: depot_tools
          key: depot-tools-${{ needs.check-version.outputs.new_version }}
