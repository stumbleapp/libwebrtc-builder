name: Build libWebRTC Bi-Weekly

on:
  schedule:
    - cron: '0 0 * * 0/2'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if no new version'
        type: boolean
        default: false

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      current_version: ${{ steps.check.outputs.current_version }}
    steps:
      - name: Check for new WebRTC version
        id: check
        run: |
          CHROME_MILESTONE=$(curl -sL "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone.json" | jq -r '.milestones | to_entries | max_by(.key) | .key')
          CURRENT=$(curl -sL "https://googlechromelabs.github.io/chrome-for-testing/latest-versions-per-milestone.json" | jq -r ".milestones[\"$CHROME_MILESTONE\"].version")
          LAST_BUILT=$(cat .last-built-version 2>/dev/null || echo "0")
          
          if [ "$CURRENT" != "$LAST_BUILT" ] || [ "${{ github.event.inputs.force_build }}" == "true" ]; then
            echo "new_version=$CURRENT" >> $GITHUB_OUTPUT
            echo "current_version=$LAST_BUILT" >> $GITHUB_OUTPUT
            echo "NEW_VERSION=$CURRENT"
          else
            echo "new_version=" >> $GITHUB_OUTPUT
            echo "current_version=$LAST_BUILT" >> $GITHUB_OUTPUT
            echo "No new version found. Current: $CURRENT, Last built: $LAST_BUILT"
          fi

  build-android:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache@v4
        with:
          path: /tmp/depot_tools
          key: depot-${{ hashFiles('.github/workflows/build.yml') }}-android
      
      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
      
      - name: Add depot_tools to PATH
        run: |
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          for i in 1 2 3; do
            fetch --nohooks webrtc_android && break
            echo "Fetch failed, retry $i/3..."
            sleep 30
          done
          for i in 1 2 3; do
            gclient sync -D --force && break
            echo "Sync failed, retry $i/3..."
            sleep 30
          done
      
      - name: Cache WebRTC source
        uses: actions/cache@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}-android
      
      - name: Build Android AAR
        run: |
          cd webrtc-src/src
          ./build/install-build-deps.sh
          tools_webrtc/android/build_aar.py --output /tmp/webrtc-build
      
      - name: Prepare Android artifacts
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p output-${VERSION}/lib
          cp /tmp/webrtc-build/*.so output-${VERSION}/lib/ 2>/dev/null || true

      - name: Create Android binary artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          zip -r libwebrtc-android-${VERSION}.zip -r output-${VERSION}/lib

      - name: Create headers artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p headers-output
          cp -r webrtc-src/src/api/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/common_audio/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/common_video/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/modules/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/sdk/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/rtc_base/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/rtc_tools/* headers-output/ 2>/dev/null || true
          cp -r webrtc-src/src/third_party/abseil-cpp headers-output/third_party/ 2>/dev/null || true
          zip -r libwebrtc-headers-${VERSION}.zip headers-output

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-binary
          path: libwebrtc-android-*.zip
          compression-level: 0

      - name: Upload headers artifact
        uses: actions/upload-artifact@v4
        with:
          name: headers
          path: libwebrtc-headers-*.zip
          compression-level: 0

  build-apple:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache@v4
        with:
          path: /tmp/depot_tools
          key: depot-${{ hashFiles('.github/workflows/build.yml') }}-apple
      
      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
      
      - name: Add depot_tools to PATH
        run: |
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          for i in 1 2 3; do
            fetch --nohooks webrtc && break
            echo "Fetch failed, retry $i/3..."
            sleep 30
          done
          for i in 1 2 3; do
            gclient sync -D --force && break
            echo "Sync failed, retry $i/3..."
            sleep 30
          done

      - name: Cache WebRTC source
        uses: actions/cache@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}-apple

      - name: Build iOS framework
        run: |
          cd webrtc-src/src
          gn gen out/ios-device --args="target_os=\"ios\" target_environment=\"device\" target_cpu=\"arm64\" ios_deployment_target=\"13.0\" ios_enable_code_signing=false enable_nacl=false is_clang=true rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false" 2>&1 | grep -v "Assignment had no effect" || true
          ls out/ios-device/build.ninja && ninja -C out/ios-device ios_framework_bundle -j8
          gn gen out/ios-simulator --args="target_os=\"ios\" target_environment=\"simulator\" target_cpu=\"arm64\" ios_deployment_target=\"13.0\" ios_enable_code_signing=false enable_nacl=false is_clang=true rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false" 2>&1 | grep -v "Assignment had no effect" || true
          ls out/ios-simulator/build.ninja && ninja -C out/ios-simulator ios_framework_bundle -j8

      - name: Build tvOS framework
        run: |
          cd webrtc-src/src
          gn gen out/tvos-device --args="target_os=\"ios\" target_environment=\"device\" target_cpu=\"arm64\" ios_deployment_target=\"17.0\" ios_enable_code_signing=false enable_nacl=false is_clang=true rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false" 2>&1 | grep -v "Assignment had no effect" || true
          ls out/tvos-device/build.ninja && ninja -C out/tvos-device ios_framework_bundle -j8
          gn gen out/tvos-simulator --args="target_os=\"ios\" target_environment=\"device\" target_cpu=\"arm64\" ios_deployment_target=\"17.0\" ios_enable_code_signing=false enable_nacl=false is_clang=true rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false" 2>&1 | grep -v "Assignment had no effect" || true
          ls out/tvos-simulator/build.ninja && ninja -C out/tvos-simulator ios_framework_bundle -j8

      - name: Build macOS framework
        run: |
          cd webrtc-src/src
          gn gen out/macos-arm64 --args="target_os=\"mac\" target_cpu=\"arm64\" mac_deployment_target=\"10.15\" enable_nacl=false is_clang=true rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false" 2>&1 | grep -v "Assignment had no effect" || true
          ls out/macos-arm64/build.ninja && ninja -C out/macos-arm64 mac_framework_bundle -j8
          gn gen out/macos-x64 --args="target_os=\"mac\" target_cpu=\"x64\" mac_deployment_target=\"10.15\" enable_nacl=false is_clang=true rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false" 2>&1 | grep -v "Assignment had no effect" || true
          ls out/macos-x64/build.ninja && ninja -C out/macos-x64 mac_framework_bundle -j8

      - name: Build macOS Catalyst framework
        run: |
          cd webrtc-src/src
          gn gen out/catalyst-arm64 --args="target_os=\"ios\" target_environment=\"catalyst\" target_cpu=\"arm64\" ios_deployment_target=\"14.0\" ios_enable_code_signing=false enable_nacl=false is_clang=true rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false" 2>&1 | grep -v "Assignment had no effect" || true
          ls out/catalyst-arm64/build.ninja && ninja -C out/catalyst-arm64 ios_framework_bundle -j8
          gn gen out/catalyst-x64 --args="target_os=\"ios\" target_environment=\"catalyst\" target_cpu=\"x64\" ios_deployment_target=\"14.0\" ios_enable_code_signing=false enable_nacl=false is_clang=true rtc_unittests=false rtc_perf_tests=false rtc_build_examples=false" 2>&1 | grep -v "Assignment had no effect" || true
          ls out/catalyst-x64/build.ninja && ninja -C out/catalyst-x64 ios_framework_bundle -j8

      - name: Create Apple artifacts
        run: |
          cd webrtc-src/src
          
          cp -R out/ios-device/WebRTC.framework ios-device.framework
          cp -R out/ios-simulator/WebRTC.framework ios-simulator.framework
          xcodebuild -create-xcframework -framework ios-device.framework/WebRTC.framework -framework ios-simulator.framework/WebRTC.framework -output WebRTC.xcframework
          
          xcodebuild -create-xcframework -framework out/tvos-device/WebRTC.framework -framework out/tvos-simulator/WebRTC.framework -output WebRTC-tvOS.xcframework
          
          lipo -create -output WebRTC-mac.framework/WebRTC out/macos-arm64/WebRTC.framework/WebRTC out/macos-x64/WebRTC.framework/WebRTC
          cp -R out/macos-arm64/WebRTC.framework WebRTC-mac.framework
          
          lipo -create -output WebRTC-catalyst.framework/WebRTC out/catalyst-arm64/WebRTC.framework/WebRTC out/catalyst-x64/WebRTC.framework/WebRTC
          cp -R out/catalyst-arm64/WebRTC.framework WebRTC-catalyst.framework
          
          VERSION=${{ needs.check-version.outputs.new_version }}
          zip -r libwebrtc-ios-${VERSION}.zip WebRTC.xcframework

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: libwebrtc-ios-*.zip
          compression-level: 0

      - name: Create tvOS artifact
        run: |
          cd webrtc-src/src
          VERSION=${{ needs.check-version.outputs.new_version }}
          zip -r libwebrtc-tvos-${VERSION}.zip WebRTC-tvOS.xcframework

      - name: Upload tvOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvos
          path: libwebrtc-tvos-*.zip
          compression-level: 0

      - name: Create macOS artifact
        run: |
          cd webrtc-src/src
          VERSION=${{ needs.check-version.outputs.new_version }}
          zip -r libwebrtc-macos-${VERSION}.zip WebRTC-mac.framework

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: libwebrtc-macos-*.zip
          compression-level: 0

      - name: Create macOS Catalyst artifact
        run: |
          cd webrtc-src/src
          VERSION=${{ needs.check-version.outputs.new_version }}
          zip -r libwebrtc-macos-catalyst-${VERSION}.zip WebRTC-catalyst.framework

      - name: Upload macOS Catalyst artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-catalyst
          path: libwebrtc-macos-catalyst-*.zip
          compression-level: 0

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache@v4
        with:
          path: /tmp/depot_tools
          key: depot-${{ hashFiles('.github/workflows/build.yml') }}-linux
      
      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
      
      - name: Add depot_tools to PATH
        run: |
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          for i in 1 2 3; do
            fetch --nohooks webrtc && break
            echo "Fetch failed, retry $i/3..."
            sleep 30
          done
          for i in 1 2 3; do
            gclient sync -D --force && break
            echo "Sync failed, retry $i/3..."
            sleep 30
          done

      - name: Cache WebRTC source
        uses: actions/cache@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}-linux
       
      - name: Install sysroot
        run: |
          cd webrtc-src/src
          build/linux/sysroot_scripts/install-sysroot.py --arch=amd64
      
      - name: Build Linux
        run: |
          cd webrtc-src/src
          gn gen out/Release --args='target_os="linux" target_cpu="x64" is_debug=false' --quiet
          ninja -C out/Release webrtc -j8

      - name: Create Linux artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p lib
          cp webrtc-src/src/out/Release/lib*.so lib/ 2>/dev/null || true
          zip -r libwebrtc-linux-${VERSION}.zip lib

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: libwebrtc-linux-*.zip
          compression-level: 0

  build-linux-arm:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache@v4
        with:
          path: /tmp/depot_tools
          key: depot-${{ hashFiles('.github/workflows/build.yml') }}-linux-arm
      
      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /tmp/depot_tools
      
      - name: Add depot_tools to PATH
        run: |
          echo "/tmp/depot_tools" >> $GITHUB_PATH
      
      - name: Fetch WebRTC source
        run: |
          mkdir webrtc-src && cd webrtc-src
          export DEPOT_TOOLS_HTTP_TIMEOUT=600
          export GIT_HTTP_TIMEOUT=300
          for i in 1 2 3; do
            fetch --nohooks webrtc && break
            echo "Fetch failed, retry $i/3..."
            sleep 30
          done
          for i in 1 2 3; do
            gclient sync -D --force && break
            echo "Sync failed, retry $i/3..."
            sleep 30
          done

      - name: Cache WebRTC source
        uses: actions/cache@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}-linux-arm

      - name: Install ARM sysroot
        run: |
          cd webrtc-src/src
          build/linux/sysroot_scripts/install-sysroot.py --arch=arm
      
      - name: Build Linux ARM
        run: |
          cd webrtc-src/src
          gn gen out/Release --args='target_os="linux" target_cpu="arm" is_debug=false' --quiet
          ninja -C out/Release webrtc -j8

      - name: Create Linux ARM artifact
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          mkdir -p lib
          cp webrtc-src/src/out/Release/lib*.so lib/ 2>/dev/null || true
          zip -r libwebrtc-linux-arm-${VERSION}.zip lib

      - name: Upload Linux ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm
          path: libwebrtc-linux-arm-*.zip
          compression-level: 0

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.new_version != ''
    runs-on: windows-latest
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Cache depot_tools
        id: depot-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TEMP }}/depot_tools
          key: depot-${{ hashFiles('.github/workflows/build.yml') }}-windows
      
      - name: Install depot_tools
        if: steps.depot-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$env:TEMP/depot_tools"
      
      - name: Add depot_tools to PATH
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "$env:TEMP/depot_tools"
      
      - name: Fetch WebRTC source
        run: |
          New-Item -ItemType Directory -Force -Path webrtc-src | Out-Null
          Set-Location webrtc-src
          $env:DEPOT_TOOLS_HTTP_TIMEOUT = "600"
          $env:GIT_HTTP_TIMEOUT = "300"
          for ($i=1; $i -le 3; $i++) {
            fetch --nohooks webrtc 2>$null
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Fetch failed, retry $i/3..."
            Start-Sleep -Seconds 30
          }
          for ($i=1; $i -le 3; $i++) {
            gclient sync -D --force 2>$null
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Sync failed, retry $i/3..."
            Start-Sleep -Seconds 30
          }

      - name: Cache WebRTC source
        uses: actions/cache@v4
        with:
          path: webrtc-src
          key: webrtc-${{ needs.check-version.outputs.new_version }}-windows
      
      - name: Build Windows x64
        run: |
          Set-Location webrtc-src/src
          gn gen out/Release --args='target_os="win" target_cpu="x64" is_debug=false'
          ninja -C out/Release webrtc -j8

      - name: Build Windows x86
        run: |
          Set-Location webrtc-src/src
          gn gen out/Release-x86 --args='target_os="win" target_cpu="x86" is_debug=false'
          ninja -C out/Release-x86 webrtc -j8

      - name: Create Windows artifact
        run: |
          Set-Location webrtc-src/src
          $VERSION = "${{ needs.check-version.outputs.new_version }}"
          New-Item -ItemType Directory -Force -Path lib | Out-Null
          Copy-Item out/Release/*.dll lib/ -ErrorAction SilentlyContinue
          Copy-Item out/Release-x86/*.dll lib/ -ErrorAction SilentlyContinue
          Compress-Archive -Path lib/* -DestinationPath "libwebrtc-win-${VERSION}.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: libwebrtc-win-*.zip
          compression-level: 0

  release:
    needs: [check-version, build-android, build-apple, build-linux, build-linux-arm, build-windows]
    if: needs.check-version.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: libwebrtc-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          find artifacts/ -type f -name "libwebrtc-*" | sort

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.new_version }}
          name: WebRTC ${{ needs.check-version.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update last built version
        run: |
          echo ${{ needs.check-version.outputs.new_version }} > .last-built-version

      - name: Commit version update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update last built version to ${{ needs.check-version.outputs.new_version }}"
          file_pattern: ".last-built-version"
